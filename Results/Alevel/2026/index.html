<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>St. Jude's Secondary School — Login</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI',system-ui,sans-serif;
    min-height:100vh;
    background:linear-gradient(160deg,#0c2d5e 0%,#1a4a8a 60%,#c8a84b 100%);
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .card{
    background:#fff;border-radius:20px;width:100%;max-width:420px;
    padding:2.5rem 2rem 2rem;
    box-shadow:0 12px 48px rgba(0,0,0,.22);
  }
  .header{text-align:center;margin-bottom:1.5rem}
  .logo-ring{
    width:96px;height:96px;border-radius:50%;
    border:3px solid #c8a84b;margin:0 auto 1rem;
    overflow:hidden;display:flex;align-items:center;justify-content:center;
    background:#0c2d5e;box-shadow:0 4px 16px rgba(200,168,75,.3);
  }
  .logo-ring img{width:92px;height:92px;border-radius:50%;object-fit:cover}
  .school-name{
    font-size:16px;font-weight:700;color:#0c2d5e;
    letter-spacing:.02em;line-height:1.4;
  }
  .portal-badge{
    display:inline-block;margin-top:7px;
    background:#eef4ff;color:#1a4a8a;
    font-size:11px;font-weight:600;letter-spacing:.08em;
    padding:3px 14px;border-radius:20px;border:1px solid #c0d4f5;
  }
  .divider{
    display:flex;align-items:center;gap:10px;
    margin:1.4rem 0;
  }
  .divider hr{flex:1;border:none;border-top:1px solid #e8e8e8}
  .divider span{font-size:11px;color:#bbb;letter-spacing:.07em;white-space:nowrap}
  .field{margin-bottom:1.1rem}
  .field label{
    display:block;font-size:12px;font-weight:600;
    color:#444;margin-bottom:5px;letter-spacing:.03em;
  }
  .input-wrap{position:relative}
  .input-wrap svg{
    position:absolute;left:11px;top:50%;transform:translateY(-50%);
    pointer-events:none;transition:stroke .2s;
  }
  .input-wrap:focus-within svg{stroke:#0c2d5e}
  .input-wrap input{
    width:100%;height:44px;border:1.5px solid #ddd;
    border-radius:9px;padding:0 12px 0 38px;
    font-size:14px;color:#222;outline:none;
    background:#fafafa;transition:border-color .2s,background .2s;
  }
  .input-wrap input:focus{border-color:#0c2d5e;background:#fff}
  .btn{
    width:100%;height:46px;background:#0c2d5e;color:#c8a84b;
    border:none;border-radius:9px;font-size:14px;font-weight:700;
    letter-spacing:.06em;cursor:pointer;margin-top:.35rem;
    display:flex;align-items:center;justify-content:center;gap:8px;
    transition:background .2s,transform .1s;
  }
  .btn:hover{background:#163f80}
  .btn:active{transform:scale(.98)}
  #errBox{
    display:none;margin-top:.8rem;padding:10px 13px;
    border-radius:9px;background:#fff0f0;border:1px solid #f5c0c0;
    font-size:13px;color:#c0392b;align-items:center;gap:8px;
  }
  #successBox{
    display:none;margin-top:.8rem;padding:10px 13px;
    border-radius:9px;background:#eaf6ef;border:1px solid #b2dfcc;
    font-size:13px;color:#1a7a4a;align-items:center;gap:8px;
  }
  .hint{margin-top:1.3rem;text-align:center;font-size:11.5px;color:#bbb}
  .hint strong{color:#c8a84b;font-weight:600}
  .footer-bar{
    margin-top:1.5rem;padding-top:1rem;
    border-top:1px solid #f0f0f0;text-align:center;
    font-size:10.5px;color:#ccc;letter-spacing:.05em;
  }
</style>
</head>

    <div class="school-name" style="font-size:13px;font-weight:500;color:#555;margin-top:2px">St.Jude's Secondary School</div>
    <span class="portal-badge">ALL STUDENTS PORTAL</span>
  </div>

  <!-- DIVIDER -->
  <div class="divider">
    <hr><span>SECURE ACCESS</span><hr>
  </div>

  <!-- FORM -->
  <div class="field">
    <label for="email">School email address</label>
    <div class="input-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
      </svg>
      <input type="email" id="email" autocomplete="email"
             placeholder="yourname@schoolofstjude.co.tz"
             onkeydown="if(event.key==='Enter')checkAccess()"/>
    </div>
  </div>

  <button class="btn" onclick="checkAccess()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="#c8a84b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
      <polyline points="10 17 15 12 10 7"/>
      <line x1="15" y1="12" x2="3" y2="12"/>
    </svg>
    Sign in to Dashboard
  </button>

  <!-- MESSAGES -->
  <div id="errBox" role="alert">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
         stroke="#c0392b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span id="errText">Access denied.</span>
  </div>

  <div id="successBox" role="status">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
         stroke="#1a7a4a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
      <polyline points="22 4 12 14.01 9 11.01"/>
    </svg>
    <span>Email verified! Redirecting to dashboard…</span>
  </div>

  <p class="hint">Restricted to <strong>@schoolofstjude.co.tz</strong> accounts only.</p>
  <div class="footer-bar">FIGHTING POVERTY THROUGH EDUCATION &nbsp;·&nbsp; ARUSHA, TANZANIA</div>

</div><!-- /card -->

<script>
function checkAccess() {
  var email    = (document.getElementById('email').value || '').trim();
  var errBox   = document.getElementById('errBox');
  var errText  = document.getElementById('errText');
  var successBox = document.getElementById('successBox');

  errBox.style.display    = 'none';
  successBox.style.display = 'none';

  if (!email) {
    errText.textContent = 'Please enter your school email address.';
    errBox.style.display = 'flex';
    return;
  }
  if (email.toLowerCase().endsWith('@schoolofstjude.co.tz')) {
    successBox.style.display = 'flex';
    setTimeout(function() { window.location.href = 'Dashboard.html'; }, 1200);
  } else {
    errText.textContent = 'Access denied. Only @schoolofstjude.co.tz accounts are permitted.';
    errBox.style.display = 'flex';
    document.getElementById('email').focus();
  }
}
</script>
